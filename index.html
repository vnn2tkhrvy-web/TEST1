<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nevrotico.com | HR & Digital Innovator</title>
    <style>
        /* Questa sezione CSS definisce lo stile, i colori e la grafica del sito */
        :root {
            --bg-color: #0d1117;
            --card-bg: #161b22;
            --text-color: #c9d1d9;
            --accent-color: #58a6ff;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
        }

        .container {
            background-color: var(--card-bg);
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.5);
            max-width: 450px;
            width: 100%;
            text-align: center;
            border: 1px solid #30363d;
        }

        h1 {
            color: #ffffff;
            font-size: 2.2rem;
            margin-bottom: 5px;
            letter-spacing: -0.5px;
        }

        .subtitle {
            color: var(--accent-color);
            font-weight: 600;
            text-transform: uppercase;
            font-size: 0.85rem;
            letter-spacing: 1px;
            margin-bottom: 25px;
        }

        p {
            line-height: 1.6;
            font-size: 1.05rem;
            margin-bottom: 30px;
        }

        .links-container {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .btn {
            background-color: #21262d;
            color: #ffffff;
            text-decoration: none;
            padding: 12px 20px;
            border-radius: 6px;
            font-weight: 500;
            transition: all 0.2s ease;
            border: 1px solid #30363d;
        }

        .btn:hover {
            background-color: var(--accent-color);
            color: var(--bg-color);
            border-color: var(--accent-color);
            transform: translateY(-2px);
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>nevrotico.com</h1>
        <div class="subtitle">HR & Tech Enthusiast</div>
        
        <p>
            Esploro l'intersezione tra comportamento umano, dinamiche organizzative e innovazione digitale. Mi piace sperimentare con l'AI e ottimizzare processi.
        </p>

        <div class="links-container">
            <a href="https://linkedin.com" target="_blank" class="btn">Connettiti su LinkedIn</a>
            <a href="mailto:info@nevrotico.com" class="btn">Scrivimi un'Email</a>
        </div>
    </div>

</body>
</html>
